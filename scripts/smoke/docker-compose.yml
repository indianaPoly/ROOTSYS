services:
  postgres:
    image: postgres:16
    container_name: rootsys-smoke-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: ops
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d ops"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql:
    image: mysql:8.4
    container_name: rootsys-smoke-mysql
    command: --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ops
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "53306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uapp -psecret --silent"]
      interval: 2s
      timeout: 3s
      retries: 40
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
